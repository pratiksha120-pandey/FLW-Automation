name: FLW API - Newman Automation

on:
  schedule:
    - cron: '30 4 * * *'    # Daily 10:00 AM IST (UTC+5:30)
  workflow_dispatch:

jobs:
  run-newman:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman and Reporter
        run: npm install -g newman newman-reporter-htmlextra

      - name: Fetch latest Postman Collection
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          POSTMAN_COLLECTION_UID: ${{ secrets.POSTMAN_COLLECTION_UID }}
        run: |
          HTTP_STATUS=$(curl -s -o collection.json -w "%{http_code}" \
            --retry 3 --retry-delay 5 \
            -H "X-Api-Key: $POSTMAN_API_KEY" \
            "https://api.getpostman.com/collections/$POSTMAN_COLLECTION_UID")
          echo "Collection fetch status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Failed to fetch collection"
            cat collection.json
            exit 1
          fi
          echo "Collection fetched successfully"

      - name: Fetch latest Postman Environment
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          POSTMAN_ENVIRONMENT_UID: ${{ secrets.POSTMAN_ENVIRONMENT_UID }}
        run: |
          HTTP_STATUS=$(curl -s -o environment_raw.json -w "%{http_code}" \
            --retry 3 --retry-delay 5 \
            -H "X-Api-Key: $POSTMAN_API_KEY" \
            "https://api.getpostman.com/environments/$POSTMAN_ENVIRONMENT_UID")
          echo "Environment fetch status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Failed to fetch environment"
            cat environment_raw.json
            exit 1
          fi
          node -e "
            const fs   = require('fs');
            const raw  = JSON.parse(fs.readFileSync('environment_raw.json'));
            const env  = raw.environment;
            const out  = {
              id:     env.id,
              name:   env.name,
              values: env.values.map(v => ({
                key:     v.key,
                value:   v.value,
                enabled: v.enabled !== false,
                type:    v.type || 'default'
              }))
            };
            fs.writeFileSync('environment.json', JSON.stringify(out, null, 2));
            console.log('Environment ready:', env.name);
          "

      - name: Run Newman Collection
        continue-on-error: true 
        run: |
          mkdir -p reports
          newman run collection.json \
            --environment environment.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export reports/newman-report.html \
            --reporter-htmlextra-title "FLW API - Test Report" \
            --reporter-htmlextra-browserTitle "FLW API Tests" \
            --reporter-htmlextra-showOnlyFails false \
            --reporter-htmlextra-showEnvironmentData false \
            --reporter-htmlextra-showGlobalData false \
            --reporter-htmlextra-testPaging true \
            --reporter-htmlextra-logs true \
            --reporter-htmlextra-skipEnvironmentVars true \
            --reporter-htmlextra-skipGlobalVars true \
            --reporter-htmlextra-darkTheme false
             --reporter-htmlextra-hideCollectionDescription \
             --reporter-htmlextra-expand true \
            --timeout-request 60000 \
            --delay-request 300 \
            --insecure \
            --color on

      - name: Upload Newman Report as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FLW-API-Newman-Report-Run-${{ github.run_number }}
          path: reports/newman-report.html
          retention-days: 30

      - name: Send Email with Newman Report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: |
            "✅ FLW API Test Report — Run #${{ github.run_number }}"
          body: |
            Hi Team,

            FLW API Newman execution completed.

            Run     : #${{ github.run_number }}
            Branch  : ${{ github.ref_name }}
            Trigger : ${{ github.event_name }}

            Newman HTML Report is attached.
            Open the attachment in any browser to see:
              - Summary (Total Requests, Pass/Fail count)
              - Each request with response details
              - Failed tests with error messages
              - Light/Dark mode toggle

            Regards,
            Pratiksha Pandey
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: FLW API Automation
          attachments: reports/newman-report.html
