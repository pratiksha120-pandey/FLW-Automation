name: API Automation - Postman + Newman

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: false
        default: "staging"
        type: choice
        options:
          - staging
          - uat
          - production
      notify_email:
        description: "Override notification email (optional)"
        required: false
        type: string

  schedule:
    - cron: "30 2 * * *"   # Daily 8:00 AM IST

  push:
    branches:
      - main
      - develop
    paths-ignore:
      - "**.md"
      - "docs/**"

env:
  POSTMAN_BASE_URL: "https://api.getpostman.com"
  NODE_VERSION: "20"
  REPORTS_DIR: "newman-reports"

jobs:
  run-api-tests:
    name: "Fetch → Execute → Report → Notify"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Newman and reporters
        run: |
          npm install -g newman \
            newman-reporter-htmlextra \
            newman-reporter-junitfull

      - name: Prepare report directory
        run: mkdir -p ${{ env.REPORTS_DIR }}

      - name: Fetch latest Postman Collection
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          POSTMAN_COLLECTION_UID: ${{ secrets.POSTMAN_COLLECTION_UID }}
        run: |
          echo "Fetching collection: $POSTMAN_COLLECTION_UID"
          HTTP_STATUS=$(curl -s -o collection.json -w "%{http_code}" \
            --retry 3 --retry-delay 5 \
            -H "X-Api-Key: $POSTMAN_API_KEY" \
            "$POSTMAN_BASE_URL/collections/$POSTMAN_COLLECTION_UID")

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: Failed to fetch collection (HTTP $HTTP_STATUS)"
            cat collection.json
            exit 1
          fi

          TOTAL_REQUESTS=$(node -e "
            const c = require('./collection.json');
            let count = 0;
            function countRequests(items) {
              if (!items) return;
              items.forEach(item => {
                if (item.request) count++;
                if (item.item) countRequests(item.item);
              });
            }
            countRequests(c.collection.item);
            console.log(count);
          ")

          echo "Collection fetched. Total requests: $TOTAL_REQUESTS"
          echo "TOTAL_REQUESTS=$TOTAL_REQUESTS" >> $GITHUB_ENV
          echo "COLLECTION_NAME=$(node -e \"console.log(require('./collection.json').collection.info.name)\")" >> $GITHUB_ENV

      - name: Fetch latest Postman Environment
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          POSTMAN_ENVIRONMENT_UID: ${{ secrets.POSTMAN_ENVIRONMENT_UID }}
        run: |
          echo "Fetching environment: $POSTMAN_ENVIRONMENT_UID"
          HTTP_STATUS=$(curl -s -o environment_raw.json -w "%{http_code}" \
            --retry 3 --retry-delay 5 \
            -H "X-Api-Key: $POSTMAN_API_KEY" \
            "$POSTMAN_BASE_URL/environments/$POSTMAN_ENVIRONMENT_UID")

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: Failed to fetch environment (HTTP $HTTP_STATUS)"
            cat environment_raw.json
            exit 1
          fi

          node -e "
            const raw = require('./environment_raw.json');
            const env = raw.environment;
            const newman_env = {
              id: env.id,
              name: env.name,
              values: env.values.map(v => ({
                key: v.key,
                value: v.value,
                enabled: v.enabled !== false,
                type: v.type || 'default'
              }))
            };
            require('fs').writeFileSync('environment.json', JSON.stringify(newman_env, null, 2));
            console.log('Environment ready:', env.name, '| Variables:', env.values.length);
          "
          echo "ENV_NAME=$(node -e \"console.log(require('./environment_raw.json').environment.name)\")" >> $GITHUB_ENV

      - name: Execute Newman
        id: newman_run
        env:
          NEWMAN_TIMEOUT: "120000"
        run: |
          set +e

          START_TIME=$(date +%s)

          newman run collection.json \
            --environment environment.json \
            --reporters cli,htmlextra,junitfull \
            --reporter-htmlextra-export "${{ env.REPORTS_DIR }}/report.html" \
            --reporter-htmlextra-title "${{ env.COLLECTION_NAME }} - API Test Report" \
            --reporter-htmlextra-browserTitle "${{ env.COLLECTION_NAME }}" \
            --reporter-htmlextra-showOnlyFails false \
            --reporter-htmlextra-testPaging true \
            --reporter-htmlextra-showEnvironmentData true \
            --reporter-junitfull-export "${{ env.REPORTS_DIR }}/junit-report.xml" \
            --timeout-request $NEWMAN_TIMEOUT \
            --color on \
            2>&1 | tee "${{ env.REPORTS_DIR }}/cli-output.txt"

          NEWMAN_EXIT_CODE=${PIPESTATUS[0]}
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))

          echo "NEWMAN_EXIT_CODE=$NEWMAN_EXIT_CODE" >> $GITHUB_ENV
          echo "EXECUTION_TIME=${DURATION}s"        >> $GITHUB_ENV

          node scripts/parse-results.js \
            "${{ env.REPORTS_DIR }}/junit-report.xml" \
            "$GITHUB_ENV"

          exit $NEWMAN_EXIT_CODE

      - name: Upload reports as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports-${{ github.run_number }}-${{ github.run_attempt }}
          path: ${{ env.REPORTS_DIR }}/
          retention-days: 30

      - name: Send email notification
        if: always()
        env:
          SMTP_USER:        ${{ secrets.SMTP_USER }}
          SMTP_PASS:        ${{ secrets.SMTP_PASS }}
          SMTP_HOST:        ${{ secrets.SMTP_HOST }}
          SMTP_PORT:        ${{ secrets.SMTP_PORT }}
          NOTIFY_EMAIL:     ${{ inputs.notify_email || secrets.NOTIFY_EMAIL }}
          TESTS_TOTAL:      ${{ env.TESTS_TOTAL }}
          TESTS_PASSED:     ${{ env.TESTS_PASSED }}
          TESTS_FAILED:     ${{ env.TESTS_FAILED }}
          FAILURE_DETAILS:  ${{ env.FAILURE_DETAILS }}
          EXECUTION_TIME:   ${{ env.EXECUTION_TIME }}
          COLLECTION_NAME:  ${{ env.COLLECTION_NAME }}
          ENV_NAME:         ${{ env.ENV_NAME }}
          TOTAL_REQUESTS:   ${{ env.TOTAL_REQUESTS }}
          NEWMAN_EXIT_CODE: ${{ env.NEWMAN_EXIT_CODE }}
          GITHUB_RUN_URL:   "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          TRIGGERED_BY:     ${{ github.event_name }}
          BRANCH:           ${{ github.ref_name }}
        run: node scripts/send-email.js

      - name: Evaluate test results
        if: always()
        run: |
          echo "Collection : ${{ env.COLLECTION_NAME }}"
          echo "Environment: ${{ env.ENV_NAME }}"
          echo "Total APIs : ${{ env.TOTAL_REQUESTS }}"
          echo "Tests      : ${{ env.TESTS_TOTAL }}"
          echo "Passed     : ${{ env.TESTS_PASSED }}"
          echo "Failed     : ${{ env.TESTS_FAILED }}"
          echo "Duration   : ${{ env.EXECUTION_TIME }}"
          if [ "${{ env.NEWMAN_EXIT_CODE }}" != "0" ]; then
            echo "One or more tests FAILED."
            exit 1
          fi
          echo "All tests PASSED."
